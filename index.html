<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班级排座位系统</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  color: #333;
}
.top-bar {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 18px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  flex-wrap: wrap;
  gap: 12px;
}
.top-bar h1 { font-size: 22px; font-weight: 700; }
.top-bar .subtitle { font-size: 13px; opacity: 0.85; margin-top: 2px; }
.server-status {
  font-size: 12px;
  opacity: 0.9;
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot.online { background: #52c41a; box-shadow: 0 0 6px rgba(82,196,26,0.6); }
.status-dot.offline { background: #ff4d4f; }

.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.toolbar button {
  padding: 8px 18px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
  white-space: nowrap;
}
.toolbar button:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.toolbar button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.btn-primary { background: #fff; color: #667eea; }
.btn-success { background: #52c41a; color: #fff; }
.btn-danger { background: #ff4d4f; color: #fff; }
.btn-warning { background: #faad14; color: #fff; }
.btn-info { background: #1890ff; color: #fff; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

.config-bar {
  background: #fff;
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.config-bar label { font-size: 13px; color: #555; font-weight: 500; }
.config-bar input[type="number"] {
  width: 60px;
  padding: 5px 8px;
  border: 1px solid #d9d9d9;
  border-radius: 4px;
  font-size: 14px;
  text-align: center;
}
.config-bar input[type="text"] {
  padding: 5px 10px;
  border: 1px solid #d9d9d9;
  border-radius: 4px;
  font-size: 14px;
  width: 180px;
}
.config-bar .config-group { display: flex; align-items: center; gap: 6px; }
.config-bar select {
  padding:5px 8px;
  border:1px solid #d9d9d9;
  border-radius:4px;
  font-size:13px;
}

/* Classroom Canvas */
.classroom-wrapper {
  background: #fff;
  border-radius: 12px;
  padding: 24px 20px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  min-height: 400px;
}
.podium {
  text-align: center;
  margin: 0 auto 20px;
  width: 160px;
  padding: 10px;
  background: linear-gradient(135deg, #f5f7fa, #e8ecf1);
  border: 2px solid #d0d5dd;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 600;
  color: #666;
  letter-spacing: 4px;
  position: relative;
  flex-shrink: 0;
}
.podium::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 8px solid transparent;
  border-top-color: #d0d5dd;
}
.podium.left::after, .podium.right::after { display: none; }

.seating-grid {
  display: grid;
  gap: 10px;
  margin: 20px auto 0;
  justify-content: center;
  padding: 10px;
  max-width: 100%;
}
.seat {
  min-width: 80px;
  min-height: 56px;
  background: #f8f9ff;
  border: 2px solid #d0d5f0;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 8px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  word-break: break-all;
}
.seat:hover { border-color: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,0.2); }
.seat.occupied { background: #e6f7ff; border-color: #1890ff; }
.seat.empty { background: #fafafa; border-color: #eee; color: #bbb; font-size: 12px; }
.seat .remove-btn {
  position: absolute;
  top: -8px;
  right: -8px;
  width: 18px;
  height: 18px;
  background: #ff4d4f;
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 11px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.seat:hover .remove-btn { display: flex; }
.seat.dragging { opacity: 0.5; }
.seat.drag-over { border-color: #52c41a; background: #f6ffed; }

/* Student list panel */
.panel-row {
  display: flex;
  gap: 16px;
  margin-top: 16px;
}
.student-panel {
  flex: 1;
  background: #fff;
  border-radius: 10px;
  padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.student-panel h3 {
  font-size: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.student-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 50px;
  max-height: 240px;
  overflow-y: auto;
  padding: 8px;
  border: 1px dashed #d9d9d9;
  border-radius: 6px;
}
.student-tag {
  padding: 4px 12px;
  background: #f0f5ff;
  border: 1px solid #adc6ff;
  border-radius: 12px;
  font-size: 12px;
  cursor: grab;
  user-select: none;
  transition: all 0.15s;
}
.student-tag:hover { background: #d6e4ff; transform: scale(1.04); }
.student-tag:active { cursor: grabbing; }
.student-tag.dragging { opacity: 0.4; }
.add-student-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.add-student-row input { flex: 1; padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; }
.add-student-row button { padding: 6px 14px; border: none; border-radius: 4px; background: #667eea; color: #fff; cursor: pointer; font-size: 13px; }
.add-student-row button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  min-width: 400px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.modal-box h2 { font-size: 18px; margin-bottom: 16px; }
.modal-box textarea {
  width: 100%;
  height: 200px;
  padding: 10px;
  border: 1px solid #d9d9d9;
  border-radius: 6px;
  font-size: 13px;
  resize: vertical;
  font-family: monospace;
}
.modal-box .modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 14px;
}
.modal-box .modal-actions button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 2000;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.loading { background: #1890ff; }
.toast.success { background: #52c41a; }
.toast.error { background: #ff4d4f; }

.legend { display: flex; gap: 16px; margin-top: 12px; font-size: 12px; color: #888; align-items: center; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-color { width: 16px; height: 14px; border-radius: 3px; }

@media (max-width: 768px) {
  .top-bar { flex-direction: column; align-items: flex-start; }
  .toolbar { width: 100%; justify-content: flex-start; }
  .panel-row { flex-direction: column; }
  .config-bar { flex-direction: column; align-items: stretch; }
  .config-bar .config-group { justify-content: space-between; }
  .modal-box { min-width: unset; width: 95vw; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>📚 班级排座位系统</h1>
    <div class="subtitle">
      <span class="server-status">
        <span class="status-dot offline" id="statusDot"></span>
        <span id="statusText">连接中...</span>
      </span>
    </div>
  </div>
  <div class="toolbar">
    <button class="btn-primary" onclick="saveToServer()">💾 保存</button>
    <button class="btn-info" onclick="exportData()">📤 导出</button>
    <button class="btn-success" onclick="document.getElementById('excelInput').click()">📥 导入 Excel</button>
    <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" onchange="importExcel(event)">
    <button class="btn-warning" onclick="randomAssign()">🎲 随机排座</button>
    <button class="btn-danger" onclick="clearAll()">🗑️ 清空</button>
  </div>
</div>

<div class="container">
  <div class="config-bar">
    <div class="config-group">
      <label>行数：</label>
      <input type="number" id="rowCount" value="6" min="1" max="20">
    </div>
    <div class="config-group">
      <label>列数：</label>
      <input type="number" id="colCount" value="6" min="1" max="20">
    </div>
    <div class="config-group">
      <label>讲台位置：</label>
      <select id="podiumPos">
        <option value="top">上方</option>
        <option value="bottom">下方</option>
        <option value="left">左侧</option>
        <option value="right">右侧</option>
      </select>
    </div>
    <button style="padding:6px 16px;border:none;border-radius:4px;background:#667eea;color:#fff;cursor:pointer;font-size:13px;" onclick="applyGrid()">🔄 应用布局</button>
  </div>

  <div class="classroom-wrapper" id="classroomWrapper">
    <div id="podiumContainer"></div>
    <div class="seating-grid" id="seatingGrid"></div>
  </div>

  <div class="legend">
    <span>💡 拖拽交换座位</span>
    <span>💡 拖拽姓名到空位安排入座</span>
    <span>💡 双击名单删除学生</span>
    <span>💡 数据自动与服务器同步</span>
  </div>

  <div class="panel-row">
    <div class="student-panel">
      <h3>
        <span>👥 未入座学生 (<span id="studentCount">0</span>人)</span>
        <span>
          <button class="btn-danger" style="padding:3px 10px;font-size:12px;" onclick="clearStudents()">清空名单</button>
        </span>
      </h3>
      <div class="student-list" id="studentList"></div>
      <div class="add-student-row">
        <input type="text" id="newStudentName" placeholder="输入姓名，回车添加" onkeydown="if(event.key==='Enter')addStudent()">
        <button id="addStudentBtn" onclick="addStudent()">添加</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h2 id="modalTitle">信息</h2>
    <textarea id="modalTextarea" placeholder="每行一个姓名..."></textarea>
    <div class="modal-actions">
      <button style="background:#f0f0f0;color:#333;" onclick="closeModal()">取消</button>
      <button style="background:#667eea;color:#fff;" id="modalConfirmBtn" onclick="modalConfirm()">确定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 状态 ==========
let config = {
  rows: 6,
  cols: 6,
  podium: 'top',
  grid: [],
  students: []
};
let dragSource = null;
let loading = false;
let loadError = false;

// ========== 服务器 API 基础路径 ==========
const API_BASE = window.location.origin;

// ========== Toast ==========
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function setLoading(v) {
  loading = v;
  document.querySelectorAll('.toolbar button').forEach(b => b.disabled = v);
  document.getElementById('addStudentBtn').disabled = v;
}

// ========== 服务器通信 ==========
async function fetchFromServer(url, options = {}) {
  try {
    const resp = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options
    });
    const data = await resp.json();
    return data;
  } catch (err) {
    console.error('请求失败:', err);
    return { success: false, message: '无法连接服务器: ' + err.message };
  }
}

async function loadFromServer() {
  setLoading(true);
  const result = await fetchFromServer(API_BASE + '/api/config');
  
  if (result.success && result.data) {
    config.rows = result.data.rows;
    config.cols = result.data.cols;
    config.podium = result.data.podium;
    config.grid = result.data.grid || [];
    config.students = result.data.students || [];
    
    document.getElementById('rowCount').value = config.rows;
    document.getElementById('colCount').value = config.cols;
    document.getElementById('podiumPos').value = config.podium;
    
    renderAll();
    
    document.getElementById('statusDot').className = 'status-dot online';
    document.getElementById('statusText').textContent = '已连接';
    loadError = false;
    showToast('✅ 数据加载成功', 'success');
  } else {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = '连接失败，使用本地模式';
    loadError = true;
    showToast('⚠️ 无法加载数据：' + (result.message || '连接失败'), 'error');
    
    // 本地模式兜底：尝试 localStorage
    try {
      const raw = localStorage.getItem('seating_chart_backup');
      if (raw) {
        const local = JSON.parse(raw);
        Object.assign(config, local);
        renderAll();
        showToast('📁 已加载本地备份数据', '');
      }
    } catch(e) {}
  }
  setLoading(false);
}

async function saveToServer() {
  setLoading(true);
  
  // 收集当前 grid 数据
  const grid = [];
  for (let r = 0; r < config.rows; r++) {
    grid[r] = [];
    for (let c = 0; c < config.cols; c++) {
      grid[r][c] = config.grid[r]?.[c] || null;
    }
  }
  
  // 收集未入座学生
  const seated = new Set();
  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      if (grid[r][c]) seated.add(grid[r][c]);
    }
  }
  // 所有学生 = 已入座 + 未入座
  const allStudents = [...new Set([
    ...config.students.filter(s => !seated.has(s)),
    ...Array.from(seated)
  ])];
  
  const payload = {
    rows: config.rows,
    cols: config.cols,
    podium: config.podium,
    grid,
    students: allStudents
  };
  
  const result = await fetchFromServer(API_BASE + '/api/config', {
    method: 'POST',
    body: JSON.stringify(payload)
  });
  
  if (result.success) {
    showToast('💾 已保存到服务器', 'success');
    // 本地备份
    try { localStorage.setItem('seating_chart_backup', JSON.stringify(payload)); } catch(e) {}
  } else {
    showToast('❌ 保存失败: ' + (result.message || '未知错误'), 'error');
  }
  setLoading(false);
}

// ========== 渲染 ==========
function renderAll() {
  buildPodiumLayout();
  renderGrid();
  renderStudentList();
  updateStudentCount();
}

function updateStudentCount() {
  const seated = getSeatedSet();
  const unseated = config.students.filter(s => !seated.has(s)).length;
  document.getElementById('studentCount').textContent = unseated;
}

function getSeatedSet() {
  const set = new Set();
  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      if (config.grid[r]?.[c]) set.add(config.grid[r][c]);
    }
  }
  return set;
}

function buildPodiumLayout() {
  const wrapper = document.getElementById('classroomWrapper');
  const grid = document.getElementById('seatingGrid');
  
  const oldPodium = wrapper.querySelector('.podium');
  if (oldPodium) oldPodium.remove();
  
  wrapper.style.display = 'flex';
  const podium = document.createElement('div');
  podium.className = 'podium';
  podium.textContent = '🎓 讲 台';
  
  const pos = config.podium || 'top';
  if (pos === 'top') {
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = 'center';
    wrapper.insertBefore(podium, grid);
  } else if (pos === 'bottom') {
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = 'center';
    wrapper.appendChild(podium);
    podium.style.marginTop = '10px';
    podium.style.marginBottom = '0';
    podium.style.transform = 'none';
    podium.querySelector('::after') && podium.style.setProperty('--podium-arrow', 'top');
  } else if (pos === 'left') {
    wrapper.style.flexDirection = 'row';
    wrapper.style.alignItems = 'center';
    wrapper.style.justifyContent = 'center';
    wrapper.style.gap = '10px';
    podium.style.writingMode = 'vertical-lr';
    podium.style.letterSpacing = '10px';
    podium.style.width = '40px';
    podium.style.padding = '20px 6px';
    wrapper.insertBefore(podium, grid);
  } else if (pos === 'right') {
    wrapper.style.flexDirection = 'row';
    wrapper.style.alignItems = 'center';
    wrapper.style.justifyContent = 'center';
    wrapper.style.gap = '10px';
    podium.style.writingMode = 'vertical-lr';
    podium.style.letterSpacing = '10px';
    podium.style.width = '40px';
    podium.style.padding = '20px 6px';
    wrapper.appendChild(podium);
  }
}

function renderGrid() {
  const gridEl = document.getElementById('seatingGrid');
  gridEl.innerHTML = '';
  gridEl.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
  
  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      const seat = document.createElement('div');
      seat.className = 'seat';
      seat.dataset.row = r;
      seat.dataset.col = c;
      
      const name = config.grid[r]?.[c];
      if (name) {
        seat.textContent = name;
        seat.classList.add('occupied');
        const rm = document.createElement('button');
        rm.className = 'remove-btn';
        rm.textContent = '×';
        rm.onclick = (e) => {
          e.stopPropagation();
          removeFromSeat(r, c);
        };
        seat.appendChild(rm);
      } else {
        seat.textContent = '空位';
        seat.classList.add('empty');
        seat.onclick = () => onClickEmptySeat(r, c);
      }
      
      seat.draggable = true;
      seat.addEventListener('dragstart', (e) => {
        dragSource = { type: 'seat', row: r, col: c, name: config.grid[r]?.[c] };
        seat.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', name || '');
      });
      seat.addEventListener('dragend', () => {
        seat.classList.remove('dragging');
        document.querySelectorAll('.seat.drag-over').forEach(el => el.classList.remove('drag-over'));
      });
      seat.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        seat.classList.add('drag-over');
      });
      seat.addEventListener('dragleave', () => seat.classList.remove('drag-over'));
      seat.addEventListener('drop', (e) => {
        e.preventDefault();
        seat.classList.remove('drag-over');
        const src = dragSource;
        if (!src) return;
        
        if (src.type === 'seat') {
          swapSeats(src.row, src.col, r, c);
        } else if (src.type === 'student') {
          placeStudentOnSeat(src.name, r, c);
        }
        dragSource = null;
      });
      
      gridEl.appendChild(seat);
    }
  }
}

function renderStudentList() {
  const listEl = document.getElementById('studentList');
  listEl.innerHTML = '';
  
  const seated = getSeatedSet();
  
  let unseatedCount = 0;
  config.students.forEach(name => {
    if (seated.has(name) || !name) return;
    unseatedCount++;
    const tag = document.createElement('span');
    tag.className = 'student-tag';
    tag.textContent = name;
    tag.draggable = true;
    
    tag.addEventListener('dragstart', (e) => {
      dragSource = { type: 'student', name };
      tag.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', name);
    });
    tag.addEventListener('dragend', () => tag.classList.remove('dragging'));
    
    tag.addEventListener('dblclick', async () => {
      if (!confirm(`从名单中移除「${name}」？`)) return;
      config.students = config.students.filter(s => s !== name);
      renderAll();
      // 同步到服务器
      await fetchFromServer(API_BASE + '/api/students/' + encodeURIComponent(name), { method: 'DELETE' });
      showToast(`已移除「${name}」`);
    });
    
    listEl.appendChild(tag);
  });
}

// ========== 操作 ==========
function removeFromSeat(row, col) {
  const name = config.grid[row]?.[col];
  if (!name) return;
  config.grid[row][col] = null;
  if (!config.students.includes(name)) {
    config.students.push(name);
  }
  renderAll();
}

function swapSeats(r1, c1, r2, c2) {
  const tmp = config.grid[r1][c1];
  config.grid[r1][c1] = config.grid[r2][c2];
  config.grid[r2][c2] = tmp;
  renderAll();
}

function placeStudentOnSeat(name, row, col) {
  if (!name) return;
  const existing = config.grid[row]?.[col];
  config.grid[row][col] = name;
  config.students = config.students.filter(s => s !== name);
  if (existing && !config.students.includes(existing)) {
    config.students.push(existing);
  }
  renderAll();
}

function onClickEmptySeat(row, col) {
  const name = prompt('输入学生姓名：');
  if (name && name.trim()) {
    const trimmed = name.trim();
    config.students = config.students.filter(s => s !== trimmed);
    placeStudentOnSeat(trimmed, row, col);
    showToast(`已安排「${trimmed}」入座`);
  }
}

function applyGrid() {
  const rows = parseInt(document.getElementById('rowCount').value) || 6;
  const cols = parseInt(document.getElementById('colCount').value) || 6;
  const podium = document.getElementById('podiumPos').value;
  
  config.rows = Math.max(1, Math.min(20, rows));
  config.cols = Math.max(1, Math.min(20, cols));
  config.podium = podium;
  
  const newGrid = [];
  for (let r = 0; r < config.rows; r++) {
    newGrid[r] = [];
    for (let c = 0; c < config.cols; c++) {
      newGrid[r][c] = (config.grid[r] && config.grid[r][c] !== undefined) ? config.grid[r][c] : null;
    }
  }
  config.grid = newGrid;
  
  renderAll();
  showToast(`已应用 ${config.rows}×${config.cols} 布局`);
}

// ========== 学生管理 ==========
async function addStudent() {
  const input = document.getElementById('newStudentName');
  const name = input.value.trim();
  if (!name) return;
  if (config.students.includes(name)) {
    showToast('该学生已存在');
    return;
  }
  config.students.push(name);
  input.value = '';
  renderAll();
  
  await fetchFromServer(API_BASE + '/api/students', {
    method: 'POST',
    body: JSON.stringify({ name })
  });
  
  // 自动保存完整数据
  saveToServer();
  showToast(`已添加「${name}」`);
}

function clearStudents() {
  if (!confirm('确定清空所有未入座的学生名单？已在座位上的不受影响。')) return;
  const seated = getSeatedSet();
  config.students = config.students.filter(s => seated.has(s));
  renderAll();
  showToast('已清空未入座名单');
}

// ========== 随机排座 ==========
async function randomAssign() {
  const available = config.students.filter(s => {
    for (let r = 0; r < config.rows; r++) {
      for (let c = 0; c < config.cols; c++) {
        if (config.grid[r]?.[c] === s) return false;
      }
    }
    return true;
  });
  
  const emptySeats = [];
  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      if (!config.grid[r]?.[c]) emptySeats.push({row: r, col: c});
    }
  }
  
  if (available.length === 0) { showToast('学生名单为空'); return; }
  if (emptySeats.length === 0) { showToast('没有空位了'); return; }
  
  // 打乱
  for (let i = available.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [available[i], available[j]] = [available[j], available[i]];
  }
  for (let i = emptySeats.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [emptySeats[i], emptySeats[j]] = [emptySeats[j], emptySeats[i]];
  }
  
  const count = Math.min(available.length, emptySeats.length);
  for (let i = 0; i < count; i++) {
    const {row, col} = emptySeats[i];
    config.grid[row][col] = available[i];
    config.students = config.students.filter(s => s !== available[i]);
  }
  
  renderAll();
  showToast(`🎲 已随机安排 ${count} 位同学入座`, 'success');
  
  // 服务器端随机排座
  await fetchFromServer(API_BASE + '/api/random-assign', { method: 'POST' });
}

// ========== 导入 Excel ==========
async function importExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
      
      if (json.length === 0) { showToast('Excel 为空'); return; }
      
      const names = [];
      for (let row of json) {
        if (!Array.isArray(row)) continue;
        for (let cell of row) {
          if (cell && String(cell).trim()) {
            const n = String(cell).trim();
            if (!names.includes(n)) names.push(n);
          }
        }
      }
      
      if (names.length === 0) { showToast('未找到学生姓名'); return; }
      
      const preview = names.slice(0, 20).join('、') + (names.length > 20 ? `... (共${names.length}个)` : '');
      if (!confirm(`从 Excel 中识别到以下姓名（部分）：\n${preview}\n\n点击确定导入？`)) {
        event.target.value = '';
        return;
      }
      
      let added = 0;
      names.forEach(n => {
        if (!config.students.includes(n)) {
          config.students.push(n);
          added++;
        }
      });
      
      renderAll();
      showToast(`✅ 成功导入 ${added} 位学生`);
      
      // 同步到服务器
      await fetchFromServer(API_BASE + '/api/import/students', {
        method: 'POST',
        body: JSON.stringify({ names })
      });
      
    } catch(err) {
      showToast('❌ 导入失败: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

// ========== 导出 ==========
async function exportData() {
  // 先确保数据最新
  const grid = [];
  for (let r = 0; r < config.rows; r++) {
    grid[r] = [];
    for (let c = 0; c < config.cols; c++) {
      grid[r][c] = config.grid[r]?.[c] || null;
    }
  }
  
  const exportObj = {
    exportTime: new Date().toLocaleString('zh-CN'),
    rows: config.rows,
    cols: config.cols,
    podium: config.podium,
    seating: [],
    unseated: config.students.filter(s => {
      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          if (grid[r][c] === s) return false;
        }
      }
      return true;
    })
  };
  
  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      if (grid[r][c]) {
        exportObj.seating.push({ row: r+1, col: c+1, name: grid[r][c] });
      }
    }
  }
  
  const json = JSON.stringify(exportObj, null, 2);
  
  document.getElementById('modalTitle').textContent = '📤 导出数据';
  document.getElementById('modalTextarea').value = json;
  document.getElementById('modalConfirmBtn').textContent = '复制到剪贴板';
  document.getElementById('modalConfirmBtn').onclick = () => {
    const ta = document.getElementById('modalTextarea');
    ta.select();
    navigator.clipboard.writeText(ta.value).then(() => {
      showToast('📋 已复制到剪贴板');
      closeModal();
    }).catch(() => {
      document.execCommand('copy');
      showToast('📋 已复制');
      closeModal();
    });
  };
  document.getElementById('modalOverlay').classList.add('active');
}

// ========== 清空 ==========
async function clearAll() {
  if (!confirm('确定清空所有数据？此操作不可恢复！')) return;
  if (!confirm('⚠️ 二次确认：真的要全部清空吗？')) return;
  
  config.grid = Array.from({length: config.rows}, () => Array(config.cols).fill(null));
  config.students = [];
  renderAll();
  
  await fetchFromServer(API_BASE + '/api/clear-all', { method: 'POST' });
  showToast('🗑️ 已清空所有数据');
}

// ========== Modal ==========
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ========== 键盘快捷键 ==========
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveToServer();
  }
});

// ========== 初始化 ==========
loadFromServer();
</script>
